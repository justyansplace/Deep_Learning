seed: 42

data:
  eval_manifest: assets/math_vqa_medium/manifest.jsonl
  split: dev
  max_samples: null

model:
  vision_encoder: google/vit-base-patch16-224
  language_model: Qwen/Qwen2-0.5B-Instruct
  freeze_vision: true
  freeze_llm: true
  adapter_path: checkpoints/adapter_medium.pt
  lora: null

processor:
  image_size: 224
  num_tiles: 1
  tile_overlap: 0.0
  num_image_tokens: 49
  max_length: 384
  ignore_index: -100

inference:
  device: cuda
  dtype: float16
  max_new_tokens: 16
  temperature: 0.0
  do_sample: false
  output_path: artifacts/predictions_medium.jsonl
